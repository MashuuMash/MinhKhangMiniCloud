events {
    worker_connections 1024;
}

http {
    upstream web_servers {
        server web-frontend-server1;
        server web-frontend-server2;
    }

    server {
        listen 80;

        # Route cho Web Frontend
        location / {
            proxy_pass http://web_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route cho Student API
        location /student/ {
            proxy_pass http://application-backend-server:8081/student;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Trang danh sach sinh vien tu MariaDB
        location = /api/students-db {
            proxy_pass http://application-backend-server:8081/api/students-db;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route cho App API
        location /api/ {
            proxy_pass http://application-backend-server:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route cho Keycloak Auth
        location /auth/ {
            proxy_pass http://authentication-identity-server:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
